services:
  replica:
    build: .
    depends_on:
      neo4j:
        condition: service_healthy
    deploy:
      mode: replicated
      replicas: 3
      update_config:
        parallelism: 1
        failure_action: rollback
    restart: "always"
    environment:
      BROKER_URL: http://broker:9090/stream
      SIMULATOR_URL: http://simulator:8080
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      REPLICA_COUNT: 3
      BACKEND_URL: http://backend:8090
    networks:
      - gladiators-net

networks:
  gladiators-net:
