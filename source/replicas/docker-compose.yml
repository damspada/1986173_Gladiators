services:
  replica:
    build: .
    deploy:
      replicas: 3
    restart: "no"
    environment:
      BROKER_URL: http://broker:9090/stream
      SIMULATOR_URL: http://simulator:8080
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
    networks:
      - gladiators-net

networks:
  gladiators-net:
