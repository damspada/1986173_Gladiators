info:
  name: Inject Event - Datacenter Shutdown Disturbance
  type: http
  seq: 5

http:
  method: POST
  url: http://localhost:8080/api/admin/sensors/sensor-01/events
  body:
    type: json
    data: |-
      {
        "event_type": "datacenter_shutdown_disturbance"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
