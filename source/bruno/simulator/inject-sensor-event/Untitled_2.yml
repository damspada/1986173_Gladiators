info:
  name: Inject Event - Earthquake
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:{{simulator_port}}/api/admin/sensors/sensor-01/events
  body:
    type: json
    data: |-
      {
        "event_type": "earthquake"
      }
  auth: inherit

runtime:
  variables:
    - name: simulator_port
      value: "9090"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
