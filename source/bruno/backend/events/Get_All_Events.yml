info:
  name: Get All Events
  type: http
  seq: 1

http:
  method: GET
  url: http://localhost:{{backend_port}}/api/history/events
  auth: inherit

runtime:
  variables:
    - name: backend_port
      value: "8081"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
